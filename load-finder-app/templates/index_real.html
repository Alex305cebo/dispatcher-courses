<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Load Finder - Реальные грузы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 18px;
            opacity: 0.9;
        }

        .search-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
        }

        .search-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .form-group select {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        .btn-search {
            grid-column: 1 / -1;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-random {
            grid-column: 1 / -1;
            padding: 15px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: white;
        }

        .results-count {
            font-size: 24px;
            font-weight: 700;
        }

        .load-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .load-header {
            margin-bottom: 15px;
        }

        .load-id {
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
        }

        .route {
            font-size: 24px;
            font-weight: 700;
            color: #333;
        }

        .route-arrow {
            color: #667eea;
            margin: 0 10px;
        }

        .load-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }

        .detail-value {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .load-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }

        .broker-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .broker-name {
            font-weight: 700;
            color: #333;
            font-size: 18px;
        }

        .broker-phone {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
        }

        .company-section {
            background: #e8f4f8;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .company-title {
            font-size: 12px;
            font-weight: 700;
            color: #667eea;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .source-info {
            font-size: 14px;
            color: #999;
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚛 Load Finder</h1>
            <p>Реальные грузы с FreightFinder.com</p>
        </div>

        <div class="search-card">
            <form id="searchForm" class="search-form">
                <div class="form-group">
                    <label for="originState">Штат</label>
                    <select id="originState" required>
                        <option value="AZ" selected>Arizona (AZ)</option>
                        <option value="CA">California (CA)</option>
                        <option value="TX">Texas (TX)</option>
                        <option value="FL">Florida (FL)</option>
                        <option value="IL">Illinois (IL)</option>
                        <option value="NY">New York (NY)</option>
                        <option value="GA">Georgia (GA)</option>
                        <option value="NC">North Carolina (NC)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="equipmentType">Тип трейлера</label>
                    <select id="equipmentType" required>
                        <option value="Dry Van" selected>Dry Van</option>
                        <option value="Reefer">Reefer</option>
                        <option value="Flatbed">Flatbed</option>
                    </select>
                </div>

                <button type="submit" class="btn-search">🔍 Найти грузы</button>
                <button type="button" class="btn-random" onclick="randomSearch()">🎲 Случайный поиск</button>
            </form>
        </div>

        <div id="resultsSection" style="display: none;">
            <div class="results-header">
                <div class="results-count">Найдено: <span id="resultsCount">0</span> грузов</div>
            </div>
            <div id="loadsList"></div>
        </div>

        <div id="noResults" class="no-results" style="display: none;">
            <div>📦</div>
            <h2>Грузы не найдены</h2>
        </div>

        <div id="loading" class="loading" style="display: none;">
            <div>⏳ Поиск реальных грузов...</div>
        </div>
    </div>

    <script>
        const searchForm = document.getElementById('searchForm');
        const resultsSection = document.getElementById('resultsSection');
        const loadsList = document.getElementById('loadsList');
        const resultsCount = document.getElementById('resultsCount');
        const noResults = document.getElementById('noResults');
        const loading = document.getElementById('loading');

        searchForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            loading.style.display = 'block';
            resultsSection.style.display = 'none';
            noResults.style.display = 'none';

            const filters = {
                origin_state: document.getElementById('originState').value,
                equipment_type: document.getElementById('equipmentType').value
            };

            try {
                const response = await fetch('/api/search', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(filters)
                });

                const data = await response.json();
                
                loading.style.display = 'none';

                if (data.success && data.loads.length > 0) {
                    displayLoads(data.loads);
                } else {
                    noResults.style.display = 'block';
                }
            } catch (error) {
                console.error('Ошибка:', error);
                loading.style.display = 'none';
                alert('Ошибка при поиске грузов');
            }
        });

        function displayLoads(loads) {
            resultsSection.style.display = 'block';
            resultsCount.textContent = loads.length;
            
            loadsList.innerHTML = loads.map(load => `
                <div class="load-card">
                    <div class="load-header">
                        <div class="load-id">#${load.id} • ${load.source}</div>
                        <div class="route">
                            ${load.origin.split(',')[0]}
                            <span class="route-arrow">→</span>
                            ${load.destination.split(',')[0]}
                        </div>
                    </div>

                    <div class="load-details">
                        <div class="detail-item">
                            <div class="detail-label">📅 Дата загрузки</div>
                            <div class="detail-value">${load.pickup_date}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">📍 Откуда</div>
                            <div class="detail-value">${load.origin}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">📍 Куда</div>
                            <div class="detail-value">${load.destination}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">🚛 Оборудование</div>
                            <div class="detail-value">${load.equipment}</div>
                        </div>
                    </div>

                    <div class="company-section">
                        <div class="company-title">📋 Company Information</div>
                        <div class="broker-info">
                            <div class="broker-name">${load.broker}</div>
                            <a href="tel:${load.phone}" class="broker-phone">📞 ${load.phone}</a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function randomSearch() {
            const states = ['AZ', 'CA', 'TX', 'FL', 'IL', 'NY', 'GA', 'NC'];
            const equipment = ['Dry Van', 'Reefer', 'Flatbed'];
            
            const randomState = states[Math.floor(Math.random() * states.length)];
            const randomEquipment = equipment[Math.floor(Math.random() * equipment.length)];
            
            document.getElementById('originState').value = randomState;
            document.getElementById('equipmentType').value = randomEquipment;
            
            searchForm.dispatchEvent(new Event('submit'));
        }
    </script>
</body>
</html>
