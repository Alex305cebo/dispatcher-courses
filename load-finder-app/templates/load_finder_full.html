<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0e1a">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <title>🚛 Load Finder - Автоматический поиск грузов</title>
    <style>
        /* ═══════════════════════════════════════════════════════════
           PREMIUM SAAS DESIGN - STRIPE/LINEAR STYLE
           ═══════════════════════════════════════════════════════════ */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e1a;
            color: #ffffff;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            font-size: 125%;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 32px;
        }

        /* ═══════════════════════════════════════════════════════════
           HEADER
           ═══════════════════════════════════════════════════════════ */
        .header {
            text-align: center;
            margin-bottom: 48px;
        }

        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 100px;
            font-size: 14px;
            font-weight: 600;
            color: #a5b4fc;
            margin-bottom: 24px;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }

        h1 {
            font-size: clamp(36px, 6vw, 56px);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.02em;
            color: #ffffff;
            margin-bottom: 16px;
        }

        h1 .gradient {
            background: linear-gradient(135deg, #2563EB 0%, #7C3AED 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 18px;
            line-height: 1.6;
            color: #94a3b8;
            max-width: 640px;
            margin: 0 auto 32px;
        }

        /* ═══════════════════════════════════════════════════════════
           SEARCH BOX
           ═══════════════════════════════════════════════════════════ */
        .search-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 32px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        input[type="text"] {
            flex: 1;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 16px;
            color: #ffffff;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #6366f1;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        input[type="text"]::placeholder {
            color: #64748b;
        }

        button {
            padding: 16px 32px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.5);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .examples {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .examples span {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            font-size: 14px;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s;
        }

        .examples span:hover {
            background: rgba(99, 102, 241, 0.2);
            border-color: rgba(99, 102, 241, 0.4);
            color: #a5b4fc;
            transform: scale(1.05);
        }

        /* ═══════════════════════════════════════════════════════════
           STATUS & STATS
           ═══════════════════════════════════════════════════════════ */
        .status {
            text-align: center;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-weight: 500;
        }

        .status.searching {
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.3);
            color: #fbbf24;
        }

        .status.completed {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
        }

        .spinner {
            border: 4px solid rgba(99, 102, 241, 0.2);
            border-top: 4px solid #6366f1;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .progress-text {
            font-size: 16px;
            margin: 12px 0;
            color: #cbd5e1;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 800;
            color: #6366f1;
            display: block;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 14px;
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* ═══════════════════════════════════════════════════════════
           TABLE
           ═══════════════════════════════════════════════════════════ */
        .table-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        .loads-table {
            width: 100%;
            border-collapse: collapse;
        }

        .loads-table thead {
            background: rgba(99, 102, 241, 0.1);
            border-bottom: 1px solid rgba(99, 102, 241, 0.3);
        }

        .loads-table th {
            padding: 16px 12px;
            text-align: center;
            font-weight: 700;
            font-size: 11px;
            color: #a5b4fc;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            vertical-align: middle;
        }

        .loads-table th .icon {
            display: block;
            font-size: 20px;
            margin-bottom: 4px;
        }

        .loads-table th .label {
            display: block;
            font-size: 11px;
        }

        .loads-table td {
            padding: 16px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
            color: #cbd5e1;
            text-align: center;
            vertical-align: middle;
        }

        .loads-table tbody tr {
            transition: all 0.2s;
        }

        .loads-table tbody tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .loads-table tbody tr:last-child td {
            border-bottom: none;
        }

        .price-cell {
            font-weight: 700;
            color: #10b981;
            font-size: 16px;
        }

        .contact-cell {
            color: #6366f1;
            font-weight: 500;
        }

        .no-data {
            color: #475569;
        }

        .hidden {
            display: none;
        }

        .limit-warning {
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            text-align: center;
            color: #fbbf24;
            font-weight: 600;
        }

        /* ═══════════════════════════════════════════════════════════
           RESPONSIVE
           ═══════════════════════════════════════════════════════════ */
        @media (max-width: 768px) {
            .container {
                padding: 20px 16px;
            }

            h1 {
                font-size: 32px;
            }

            .search-box {
                flex-direction: column;
            }

            .search-card {
                padding: 20px;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .table-container {
                overflow-x: auto;
            }

            .loads-table {
                min-width: 1200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-badge">
                <span>🚛</span>
                <span>Автоматический сбор грузов</span>
            </div>
            <h1>
                <span class="gradient">Load Finder</span>
            </h1>
            <p class="subtitle">
                Профессиональный поиск грузов с полной информацией о брокерах, ценах и контактах
            </p>
        </div>

        <div class="search-card">
            <div class="search-box">
                <input 
                    type="text" 
                    id="cityInput" 
                    placeholder="Введите город и штат (например: Miami, FL)"
                    onkeypress="if(event.key === 'Enter') searchLoads()"
                >
                <button id="searchBtn" onclick="searchLoads()">🔍 Начать поиск</button>
            </div>

            <div class="examples">
                <span id="city1" onclick="setCity(this.textContent)"></span>
                <span id="city2" onclick="setCity(this.textContent)"></span>
                <span id="city3" onclick="setCity(this.textContent)"></span>
                <span id="city4" onclick="setCity(this.textContent)"></span>
                <span id="city5" onclick="setCity(this.textContent)"></span>
                <span id="city6" onclick="setCity(this.textContent)"></span>
            </div>
        </div>

        <div id="statusBox" class="hidden"></div>
        <div id="limitWarning" class="hidden"></div>
        <div id="statsBox" class="hidden"></div>
        <div id="loadsContainer" class="hidden"></div>
    </div>

    <script>
        let checkInterval = null;

        // Список городов США
        const cities = [
            'Miami, FL', 'Chicago, IL', 'Atlanta, GA', 'Los Angeles, CA', 'Dallas, TX',
            'Houston, TX', 'Phoenix, AZ', 'Philadelphia, PA', 'San Antonio, TX', 'San Diego, CA',
            'San Jose, CA', 'Austin, TX', 'Jacksonville, FL', 'Fort Worth, TX', 'Columbus, OH',
            'Charlotte, NC', 'Indianapolis, IN', 'Seattle, WA', 'Denver, CO', 'Boston, MA',
            'El Paso, TX', 'Nashville, TN', 'Detroit, MI', 'Portland, OR', 'Las Vegas, NV',
            'Memphis, TN', 'Louisville, KY', 'Baltimore, MD', 'Milwaukee, WI', 'Albuquerque, NM',
            'Tucson, AZ', 'Fresno, CA', 'Sacramento, CA', 'Kansas City, MO', 'Mesa, AZ',
            'Omaha, NE', 'Raleigh, NC', 'Long Beach, CA', 'Virginia Beach, VA', 'Oakland, CA',
            'Minneapolis, MN', 'Tampa, FL', 'Tulsa, OK', 'Arlington, TX', 'New Orleans, LA',
            'Wichita, KS', 'Cleveland, OH', 'Bakersfield, CA', 'Aurora, CO', 'Anaheim, CA',
            'Honolulu, HI', 'Santa Ana, CA', 'Riverside, CA', 'Corpus Christi, TX', 'Lexington, KY',
            'Stockton, CA', 'St. Louis, MO', 'Pittsburgh, PA', 'Anchorage, AK', 'Cincinnati, OH',
            'Greensboro, NC', 'Newark, NJ', 'Plano, TX', 'Orlando, FL', 'Irvine, CA',
            'Laredo, TX', 'Buffalo, NY', 'Madison, WI', 'Lubbock, TX', 'Chandler, AZ',
            'Scottsdale, AZ', 'Reno, NV', 'Norfolk, VA', 'Winston-Salem, NC', 'Glendale, AZ',
            'Hialeah, FL', 'Garland, TX', 'Boise, ID', 'Spokane, WA', 'Fremont, CA'
        ];

        // Генерируем 6 случайных городов при загрузке страницы
        function generateRandomCities() {
            const shuffled = cities.sort(() => 0.5 - Math.random());
            const selected = shuffled.slice(0, 6);
            
            for (let i = 0; i < 6; i++) {
                document.getElementById(`city${i + 1}`).textContent = selected[i];
            }
        }

        // Генерируем города при загрузке
        window.addEventListener('DOMContentLoaded', generateRandomCities);

        function setCity(city) {
            document.getElementById('cityInput').value = city;
        }

        async function searchLoads() {
            const city = document.getElementById('cityInput').value.trim();
            
            if (!city) {
                alert('Пожалуйста, введите город и штат');
                return;
            }

            const searchBtn = document.getElementById('searchBtn');
            const statusBox = document.getElementById('statusBox');
            const statsBox = document.getElementById('statsBox');
            const loadsContainer = document.getElementById('loadsContainer');
            const limitWarning = document.getElementById('limitWarning');

            searchBtn.disabled = true;
            searchBtn.textContent = '⏳ Поиск...';

            statusBox.className = 'status searching';
            statusBox.innerHTML = `
                <div class="spinner"></div>
                <p style="font-size: 18px; margin: 15px 0; font-weight: 600;">🔍 Поиск грузов из ${city}...</p>
                <p class="progress-text" id="progressText">Подключение к системе...</p>
            `;
            statusBox.classList.remove('hidden');
            loadsContainer.classList.add('hidden');
            statsBox.classList.add('hidden');
            limitWarning.classList.add('hidden');

            try {
                const response = await fetch('/search', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ city: city })
                });

                if (!response.ok) {
                    throw new Error('Ошибка запроса');
                }

                checkInterval = setInterval(checkStatus, 2000);

            } catch (error) {
                statusBox.className = 'status';
                statusBox.style.background = 'rgba(239, 68, 68, 0.1)';
                statusBox.style.borderColor = 'rgba(239, 68, 68, 0.3)';
                statusBox.style.color = '#ef4444';
                statusBox.textContent = '❌ Ошибка: ' + error.message;
                searchBtn.disabled = false;
                searchBtn.textContent = '🔍 Начать поиск';
            }
        }

        async function checkStatus() {
            try {
                const response = await fetch('/status');
                const data = await response.json();

                const statusBox = document.getElementById('statusBox');
                const statsBox = document.getElementById('statsBox');
                const loadsContainer = document.getElementById('loadsContainer');
                const limitWarning = document.getElementById('limitWarning');
                const searchBtn = document.getElementById('searchBtn');
                const progressText = document.getElementById('progressText');

                if (data.status === 'searching' && progressText) {
                    let statusText = data.step_name || 'Обработка';
                    if (data.step === 4) {
                        statusText = `Груз ${data.current_load} из ${data.total_loads}`;
                    }
                    progressText.textContent = statusText;
                }

                if (data.status === 'completed') {
                    clearInterval(checkInterval);
                    
                    statusBox.className = 'status completed';
                    statusBox.innerHTML = '<p style="font-size: 18px; font-weight: 600;">✅ Сбор завершен!</p>';

                    if (data.limit_reached) {
                        limitWarning.innerHTML = `
                            ⚠️ <strong>Достигнут дневной лимит просмотров!</strong><br>
                            Собрано максимум информации до появления ограничения.
                        `;
                        limitWarning.classList.remove('hidden');
                    }

                    const loads = data.loads || [];
                    const loadsWithPhone = loads.filter(l => l.phone).length;
                    const loadsWithEmail = loads.filter(l => l.email).length;
                    const loadsWithBoth = loads.filter(l => l.phone && l.email).length;
                    const loadsWithPrice = loads.filter(l => l.price).length;

                    statsBox.innerHTML = `
                        <div class="stats">
                            <div class="stat-card">
                                <span class="stat-number">${loads.length}</span>
                                <span class="stat-label">Всего грузов</span>
                            </div>
                            <div class="stat-card">
                                <span class="stat-number">${loadsWithPrice}</span>
                                <span class="stat-label">С ценой</span>
                            </div>
                            <div class="stat-card">
                                <span class="stat-number">${loadsWithPhone}</span>
                                <span class="stat-label">С телефоном</span>
                            </div>
                            <div class="stat-card">
                                <span class="stat-number">${loadsWithEmail}</span>
                                <span class="stat-label">С email</span>
                            </div>
                            <div class="stat-card">
                                <span class="stat-number">${loadsWithBoth}</span>
                                <span class="stat-label">С обоими</span>
                            </div>
                        </div>
                    `;
                    statsBox.classList.remove('hidden');

                    if (loads.length > 0) {
                        let tableHTML = `
                            <div class="table-container">
                                <table class="loads-table">
                                    <thead>
                                        <tr>
                                            <th><span class="icon">#</span></th>
                                            <th><span class="icon">📅</span><span class="label">Дата</span></th>
                                            <th><span class="icon">📍</span><span class="label">Откуда<br>(Pick up)</span></th>
                                            <th><span class="icon">📍</span><span class="label">Куда<br>(Delivery)</span></th>
                                            <th><span class="icon">📏</span><span class="label">Расстояние</span></th>
                                            <th><span class="icon">🚛</span><span class="label">Трейлер</span></th>
                                            <th><span class="icon">⚖️</span><span class="label">Вес</span></th>
                                            <th><span class="icon">💰</span><span class="label">Цена</span></th>
                                            <th><span class="icon">🏢</span><span class="label">Broker</span></th>
                                            <th><span class="icon">📞</span><span class="label">Телефон</span></th>
                                            <th><span class="icon">📧</span><span class="label">Email</span></th>
                                            <th><span class="icon">🔢</span><span class="label">DOT</span></th>
                                            <th><span class="icon">🔢</span><span class="label">MC</span></th>
                                        </tr>
                                    </thead>
                                    <tbody>
                        `;
                        
                        loads.forEach(load => {
                            tableHTML += `
                                <tr>
                                    <td>${load.number}</td>
                                    <td>${load.date || '-'}</td>
                                    <td>${load.pickup || '-'}</td>
                                    <td>${load.dropoff || '-'}</td>
                                    <td>${load.distance || '-'}</td>
                                    <td>${load.trailer || '-'}</td>
                                    <td>${load.weight || '-'}</td>
                                    <td class="price-cell">${load.price || '-'}</td>
                                    <td>${load.broker || '-'}</td>
                                    <td class="${load.phone ? 'contact-cell' : 'no-data'}">${load.phone || '-'}</td>
                                    <td class="${load.email ? 'contact-cell' : 'no-data'}">${load.email || '-'}</td>
                                    <td>${load.dot_number || '-'}</td>
                                    <td>${load.mc_number || '-'}</td>
                                </tr>
                            `;
                        });
                        
                        tableHTML += `
                                    </tbody>
                                </table>
                            </div>
                        `;
                        
                        loadsContainer.innerHTML = tableHTML;
                        loadsContainer.classList.remove('hidden');
                    }

                    searchBtn.disabled = false;
                    searchBtn.textContent = '🔍 Начать поиск';
                }

            } catch (error) {
                clearInterval(checkInterval);
                console.error('Ошибка проверки статуса:', error);
            }
        }
    </script>
</body>
</html>
