<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚛 Load Finder - Поиск грузов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            text-align: center;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .status.searching {
            background: #fff3cd;
            color: #856404;
        }

        .status.completed {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .progress-steps {
            margin-top: 20px;
        }

        .progress-step {
            display: flex;
            align-items: center;
            padding: 12px;
            margin: 8px 0;
            background: white;
            border-radius: 8px;
            border-left: 4px solid #e0e0e0;
            transition: all 0.3s;
        }

        .progress-step.active {
            border-left-color: #667eea;
            background: #f0f4ff;
        }

        .progress-step.completed {
            border-left-color: #28a745;
            background: #d4edda;
        }

        .progress-step-icon {
            font-size: 1.5em;
            margin-right: 15px;
            width: 30px;
            text-align: center;
        }

        .progress-step-text {
            flex: 1;
            font-weight: 500;
        }

        .result-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 30px;
            color: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .result-header {
            font-size: 1.5em;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
            padding-bottom: 15px;
        }

        .result-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-icon {
            font-size: 1.5em;
            margin-right: 15px;
            width: 30px;
            text-align: center;
        }

        .result-label {
            font-weight: 600;
            margin-right: 10px;
            opacity: 0.9;
        }

        .result-value {
            flex: 1;
            font-size: 1.1em;
        }

        .contact-section {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 2px solid rgba(255, 255, 255, 0.3);
        }

        .contact-title {
            font-size: 1.3em;
            font-weight: 700;
            margin-bottom: 15px;
            text-align: center;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .examples {
            text-align: center;
            color: #666;
            font-size: 0.9em;
            margin-top: 15px;
        }

        .examples span {
            display: inline-block;
            margin: 5px 10px;
            padding: 5px 15px;
            background: #f0f0f0;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .examples span:hover {
            background: #667eea;
            color: white;
            transform: scale(1.05);
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚛 Load Finder</h1>
        <p class="subtitle">Поиск грузов через TruckerPath Loadboard</p>

        <div class="search-box">
            <input 
                type="text" 
                id="cityInput" 
                placeholder="Введите город и штат (например: Miami, FL)"
                onkeypress="if(event.key === 'Enter') searchLoad()"
            >
            <button id="searchBtn" onclick="searchLoad()">🔍 Найти груз</button>
        </div>

        <div class="examples">
            <strong>Примеры:</strong>
            <span onclick="setCity('Miami, FL')">Miami, FL</span>
            <span onclick="setCity('Atlanta, GA')">Atlanta, GA</span>
            <span onclick="setCity('Greenville, SC')">Greenville, SC</span>
            <span onclick="setCity('Los Angeles, CA')">Los Angeles, CA</span>
        </div>

        <div id="statusBox" class="hidden"></div>
        <div id="resultBox" class="hidden"></div>
    </div>

    <script>
        let checkInterval = null;

        function setCity(city) {
            document.getElementById('cityInput').value = city;
        }

        async function searchLoad() {
            const city = document.getElementById('cityInput').value.trim();
            
            if (!city) {
                alert('Пожалуйста, введите город и штат');
                return;
            }

            const searchBtn = document.getElementById('searchBtn');
            const statusBox = document.getElementById('statusBox');
            const resultBox = document.getElementById('resultBox');

            // Отключаем кнопку
            searchBtn.disabled = true;
            searchBtn.textContent = '⏳ Поиск...';

            // Показываем статус
            statusBox.className = 'status searching';
            statusBox.innerHTML = `
                <div class="spinner"></div>
                <p style="font-size: 1.2em; margin: 15px 0;">Ищем груз из ${city}...</p>
                <div class="progress-steps">
                    <div class="progress-step active" id="step1">
                        <div class="progress-step-icon">🔐</div>
                        <div class="progress-step-text">Вход в TruckerPath...</div>
                    </div>
                    <div class="progress-step" id="step2">
                        <div class="progress-step-icon">🔍</div>
                        <div class="progress-step-text">Поиск грузов...</div>
                    </div>
                    <div class="progress-step" id="step3">
                        <div class="progress-step-icon">🖱️</div>
                        <div class="progress-step-text">Открытие груза...</div>
                    </div>
                    <div class="progress-step" id="step4">
                        <div class="progress-step-icon">📋</div>
                        <div class="progress-step-text">Извлечение контактов...</div>
                    </div>
                </div>
            `;
            statusBox.classList.remove('hidden');
            resultBox.classList.add('hidden');

            try {
                // Запускаем поиск
                const response = await fetch('/search', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ city: city })
                });

                if (!response.ok) {
                    throw new Error('Ошибка запроса');
                }

                // Проверяем статус каждые 2 секунды
                checkInterval = setInterval(checkStatus, 2000);

            } catch (error) {
                statusBox.className = 'status error';
                statusBox.textContent = '❌ Ошибка: ' + error.message;
                searchBtn.disabled = false;
                searchBtn.textContent = '🔍 Найти груз';
            }
        }

        async function checkStatus() {
            try {
                const response = await fetch('/status');
                const data = await response.json();

                const statusBox = document.getElementById('statusBox');
                const resultBox = document.getElementById('resultBox');
                const searchBtn = document.getElementById('searchBtn');

                // Обновляем этапы прогресса
                if (data.status === 'searching' && data.step) {
                    for (let i = 1; i <= 4; i++) {
                        const stepEl = document.getElementById('step' + i);
                        if (stepEl) {
                            if (i < data.step) {
                                stepEl.className = 'progress-step completed';
                            } else if (i === data.step) {
                                stepEl.className = 'progress-step active';
                            } else {
                                stepEl.className = 'progress-step';
                            }
                        }
                    }
                }

                if (data.status === 'completed') {
                    clearInterval(checkInterval);
                    
                    statusBox.className = 'status completed';
                    statusBox.textContent = '✅ Груз найден!';

                    // Показываем результат
                    const load = data.data;
                    resultBox.innerHTML = `
                        <div class="result-card">
                            <div class="result-header">📦 Информация о грузе</div>
                            
                            <div class="result-item">
                                <div class="result-icon">📍</div>
                                <div class="result-label">Маршрут:</div>
                                <div class="result-value">${load.origin || 'N/A'} → ${load.destination || 'N/A'}</div>
                            </div>
                            
                            <div class="result-item">
                                <div class="result-icon">💰</div>
                                <div class="result-label">Ставка:</div>
                                <div class="result-value">${load.rate || 'Не указана'}</div>
                            </div>
                            
                            <div class="result-item">
                                <div class="result-icon">📏</div>
                                <div class="result-label">Расстояние:</div>
                                <div class="result-value">${load.distance || 'Не указано'}</div>
                            </div>
                            
                            <div class="result-item">
                                <div class="result-icon">⚖️</div>
                                <div class="result-label">Вес:</div>
                                <div class="result-value">${load.weight || 'Не указан'}</div>
                            </div>
                            
                            <div class="result-item">
                                <div class="result-icon">🏢</div>
                                <div class="result-label">Брокер:</div>
                                <div class="result-value">${load.broker || 'Не указан'}</div>
                            </div>
                            
                            <div class="contact-section">
                                <div class="contact-title">📞 Контакты брокера</div>
                                
                                <div class="result-item">
                                    <div class="result-icon">📞</div>
                                    <div class="result-label">Телефон:</div>
                                    <div class="result-value">${load.phone || '❌ Не найден'}</div>
                                </div>
                                
                                <div class="result-item">
                                    <div class="result-icon">📧</div>
                                    <div class="result-label">Email:</div>
                                    <div class="result-value">${load.email || '❌ Не найден'}</div>
                                </div>
                            </div>
                        </div>
                    `;
                    resultBox.classList.remove('hidden');

                    searchBtn.disabled = false;
                    searchBtn.textContent = '🔍 Найти груз';

                } else if (data.status === 'error') {
                    clearInterval(checkInterval);
                    
                    statusBox.className = 'status error';
                    statusBox.textContent = '❌ Ошибка: ' + data.error;

                    searchBtn.disabled = false;
                    searchBtn.textContent = '🔍 Найти груз';
                }

            } catch (error) {
                clearInterval(checkInterval);
                console.error('Ошибка проверки статуса:', error);
            }
        }
    </script>
</body>
</html>
