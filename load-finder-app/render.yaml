services:
  - type: web
    name: load-finder
    env: python
    region: oregon
    plan: free
    buildCommand: "chmod +x install_chrome.sh && ./install_chrome.sh && pip install -r requirements.txt"
    startCommand: "gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 1 --timeout 600 --worker-class sync --max-requests 100 --max-requests-jitter 10 wsgi:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: CHROME_BIN
        value: /usr/bin/google-chrome
      - key: RENDER
        value: true
      - key: WEB_CONCURRENCY
        value: 1
