services:
  - type: web
    name: load-finder
    env: python
    region: oregon
    plan: free
    buildCommand: "chmod +x install_chrome.sh && ./install_chrome.sh && pip install -r requirements.txt"
    startCommand: "gunicorn --bind 0.0.0.0:$PORT --workers 1 --timeout 300 wsgi:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: CHROME_BIN
        value: /usr/bin/google-chrome
