<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Название страницы | Курсы - Диспетчера</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow-x: hidden;
            text-align: center;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.3), transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(138, 43, 226, 0.3), transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(75, 0, 130, 0.2), transparent 50%);
            animation: backgroundMove 20s ease infinite;
            z-index: -1;
        }

        @keyframes backgroundMove {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(5%, 5%) scale(1.05); }
            50% { transform: translate(-5%, 5%) scale(1.1); }
            75% { transform: translate(5%, -5%) scale(1.05); }
        }

        .container {
            max-width: 1050px;
            width: 100%;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.98);
            padding: 40px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            color: #2d3748;
            font-size: 36px;
            font-weight: 700;
            text-align: center;
        }

        .back-btn {
            padding: 14px 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .back-btn:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .content-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .section-title {
            color: #2d3748;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
            text-align: center;
        }

        .section-content p {
            color: #4a5568;
            font-size: 18px;
            line-height: 1.8;
            margin-bottom: 18px;
            text-align: center;
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            body {
                padding: 20px 15px;
            }

            .header, .content-card {
                padding: 25px 20px;
                border-radius: 15px;
            }

            .header h1 {
                font-size: 28px;
            }

            .back-btn {
                padding: 12px 22px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>


<div class="container">
    <!-- HEADER -->
    <div class="header">
        <div class="header-top">
            <h1>📄 Название страницы</h1>
            <a href="../index.html" class="back-btn">← Назад</a>
        </div>
        <p style="color: #64748b; font-size: 18px; line-height: 1.8;">
            Краткое описание страницы
        </p>
    </div>

    <!-- КОНТЕНТ -->
    <div class="content-card">
        <h2 class="section-title">Раздел 1</h2>
        <div class="section-content">
            <p>
                Ваш контент здесь...
            </p>
        </div>
    </div>

    <div class="content-card">
        <h2 class="section-title">Раздел 2</h2>
        <div class="section-content">
            <p>
                Ваш контент здесь...
            </p>
        </div>
    </div>
</div>

</body>
</html>
