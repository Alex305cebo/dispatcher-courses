<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Test Loadboard</title>
</head>
<body>
    <h1>Test Page</h1>
    <div id="loadsContainer"></div>
    <div id="error" style="color: red;"></div>
    
    <script>
        try {
            console.log('Script started');
            
            const loads = [
                {id:1001,shipper:'Amazon',pickupCity:'Los Angeles',pickupState:'CA',deliveryCity:'Las Vegas',deliveryState:'NV',distance:270,weight:45000,cargoType:'General',rate:4000,equipment:'53ft Dry Van',pickupTime:'08:00 - 17:00',pickupDate:'2025-02-24',deliveryDate:'2025-02-24',company:'Hyperlux',companyLocation:'Loveland, OH',creditScore:97,daysToPayAvg:20,contactEmail:'test@test.com',contactPhone:'MC#582169',deadhead:186,totalMiles:456,mpg:6.8,fuelCostCalc:234.71,rpm:8.77,profit:3565.29,spotDate:'$4,396',contractRate:'$4,000'}
            ];
            
            console.log('Loads:', loads.length);
            
            const container = document.getElementById('loadsContainer');
            container.innerHTML = '<h2>Found ' + loads.length + ' loads</h2>';
            
            loads.forEach(load => {
                const div = document.createElement('div');
                div.style.border = '1px solid black';
                div.style.padding = '10px';
                div.style.margin = '10px';
                div.innerHTML = `
                    <h3>Load #${load.id}</h3>
                    <p>${load.pickupCity} to ${load.deliveryCity}</p>
                    <p>Rate: ${load.rate}</p>
                `;
                container.appendChild(div);
            });
            
            console.log('Rendering complete');
            
        } catch(e) {
            console.error('Error:', e);
            document.getElementById('error').textContent = 'Error: ' + e.message;
        }
    </script>
</body>
</html>
