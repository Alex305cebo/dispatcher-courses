<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Load Board - Реестр грузов | Курсы - Диспетчера</title>
    <script src="auth-check.js"></script>
        <style>
        :root {
            --bg: #070b14;
            --text: #f0f4ff;
            --text-secondary: #8892aa;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --success: #22c55e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 30px 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.15), transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(59, 130, 246, 0.15), transparent 50%);
            animation: backgroundMove 20s ease infinite;
            z-index: -2;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(139, 92, 246, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(139, 92, 246, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        @keyframes backgroundMove {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-5%, 5%) scale(1.05); }
        }

        .container {
            max-width: 1600px;
            width: 100%;
            margin: 0 auto;
        }

        .header {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 20px 40px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: var(--text);
            font-size: 28px;
            font-weight: 800;
        }

        .back-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
        }

        .stats {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 30px 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .stat-box {
            text-align: center;
        }

        .stat-box .number {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-box .label {
            color: var(--text-secondary);
            font-size: 16px;
            margin-top: 4px;
        }

        .filters {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .filters h3 {
            color: var(--text);
            margin-bottom: 15px;
            font-weight: 700;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .filter-item input, .filter-item select {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            color: var(--text);
        }

        .filter-item input::placeholder {
            color: var(--text-secondary);
        }

        .filter-item label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 16px;
        }

        .loads-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
            align-items: start;
        }

        .load-card {
            perspective: 1000px;
            height: 620px;
            cursor: pointer;
        }

        .load-card-inner {
            position: relative;
            width: 100%;
            height: 620px;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .load-card.flipped .load-card-inner {
            transform: rotateY(180deg);
        }

        .load-card-front,
        .load-card-back {
            position: absolute;
            width: 100%;
            height: 620px;
            backface-visibility: hidden;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .load-card-front {
            border-left: 3px solid var(--primary);
        }

        .load-card-back {
            transform: rotateY(180deg);
            border-left: 3px solid #3b82f6;
            overflow-y: auto;
        }

        /* Красивый скроллбар для карточек */
        .load-card-back::-webkit-scrollbar {
            width: 6px;
        }

        .load-card-back::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }

        .load-card-back::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, var(--primary), #3b82f6);
            border-radius: 3px;
        }

        .load-card-back::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
        }

        /* Для мобильных устройств */
        @media (max-width: 768px) {
            .load-card-front::-webkit-scrollbar,
            .load-card-back::-webkit-scrollbar {
                width: 4px;
            }

            .load-card-front::-webkit-scrollbar-track,
            .load-card-back::-webkit-scrollbar-track {
                background: rgba(255, 255, 255, 0.05);
                border-radius: 2px;
            }

            .load-card-front::-webkit-scrollbar-thumb,
            .load-card-back::-webkit-scrollbar-thumb {
                background: linear-gradient(135deg, var(--primary), #3b82f6);
                border-radius: 2px;
            }
        }

        .load-card:hover .load-card-front {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(139, 92, 246, 0.4);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        .load-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            gap: 10px;
        }

        .load-route-header {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            text-align: center;
            flex: 1;
            line-height: 1.2;
        }

        .load-rate {
            font-size: 26px;
            font-weight: 900;
            color: var(--success);
            white-space: nowrap;
        }

        .load-route {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .route-text {
            color: var(--text);
            font-weight: 600;
            font-size: 16px;
        }

        .load-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .detail-item {
            color: var(--text);
            font-size: 16px;
        }

        .detail-label {
            color: var(--text-secondary);
            font-size: 16px;
        }

        .load-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 8px;
            border-top: 1px solid var(--border);
            margin-top: 8px;
        }

        .equipment-badge {
            background: rgba(139, 92, 246, 0.15);
            border: 1px solid rgba(139, 92, 246, 0.3);
            color: #a78bfa;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
        }

        .status-badge {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: var(--success);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
        }

        .analysis-section {
            margin-bottom: 10px;
        }

        .analysis-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .analysis-content {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid var(--border);
        }

        .metric-label {
            color: var(--text-secondary);
            font-size: 16px;
        }

        .metric-value {
            color: var(--text);
            font-weight: 600;
            font-size: 16px;
        }

        .rating-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 3px;
        }

        .rating-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #3b82f6);
            transition: width 0.3s ease;
        }

        .recommendation {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.3);
            padding: 8px;
            border-radius: 8px;
            margin-top: 8px;
            font-size: 16px;
        }

        .recommendation.positive {
            background: rgba(34, 197, 94, 0.1);
            border-color: rgba(34, 197, 94, 0.3);
        }

        .recommendation.negative {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
        }

        .flip-hint {
            position: absolute;
            bottom: 8px;
            right: 8px;
            font-size: 16px;
            color: var(--text);
            opacity: 0.3;
            font-weight: 700;
            animation: fadeOut 4s forwards;
        }

        @keyframes fadeOut {
            0% {
                opacity: 0.7;
            }
            70% {
                opacity: 0.7;
            }
            100% {
                opacity: 0;
            }
        }

        #scrollToTop {
            display: none;
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            box-shadow: 0 4px 16px rgba(139, 92, 246, 0.4);
            transition: all 0.3s ease;
            align-items: center;
            justify-content: center;
        }

        #scrollToTop:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 24px rgba(139, 92, 246, 0.5);
        }

        /* Theme Toggle Button */
        #themeToggle {
            display: none !important;
        }

        #themeToggle:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.3);
        }

        @media (max-width: 768px) {
            body {
                padding: 15px;
            }

            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
                padding: 20px;
            }

            .header h1 {
                font-size: 22px;
            }

            .filters {
                padding: 20px;
            }

            .filter-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .stats {
                padding: 20px;
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }

            .loads-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .load-card {
                height: 620px;
            }

            .load-card-inner {
                height: 620px;
            }

            .load-card-front,
            .load-card-back {
                height: 620px;
                overflow-y: auto;
            }

            .load-route-header {
                font-size: 16px;
            }

            .load-rate {
                font-size: 22px;
            }

            .load-details {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            #scrollToTop {
                width: 45px;
                height: 45px;
                bottom: 20px;
                right: 20px;
                font-size: 16px;
            }

            #themeToggle {
                width: 45px;
                height: 45px;
                top: 15px;
                right: 15px;
                font-size: 20px;
             display: none !important;}

            .flip-hint {
                animation: fadeOutMobile 5s forwards;
            }

            @keyframes fadeOutMobile {
                0% {
                    opacity: 0.7;
                }
                80% {
                    opacity: 0.7;
                }
                100% {
                    opacity: 0;
                }
            }

            .load-card:hover .flip-hint {
                animation: fadeOutMobile 5s forwards;
            }
        }
    </style>
</head>

            if (totalScore >= 10 && profitRating >= 8) {
                recommendation = '🌟 НАСТОЯТЕЛЬНО РЕКОМЕНДУЕТСЯ';
                reason = `Отличное соотношение прибыли и рисков. Прибыль: $${estimatedProfit} (${profitMargin}% маржа). ${profitAnalysis}`;
                recommendationClass = 'positive';
            } else if (totalScore >= 7 && profitRating >= 7) {
                recommendation = '✅ РЕКОМЕНДУЕТСЯ ВЗЯТЬ';
                reason = `Хорошая прибыльность с приемлемыми рисками. Прибыль: $${estimatedProfit}. ${profitAnalysis}`;
                recommendationClass = 'positive';
            } else if (totalScore >= 5 || profitRating >= 6) {
                recommendation = '⚠️ СРЕДНИЙ ПРИОРИТЕТ';
                reason = `Умеренная прибыль. Прибыль: $${estimatedProfit}. Оцените альтернативы. ${profitAnalysis}`;
                recommendationClass = '';
            } else if (totalScore >= 3) {
                recommendation = '⚠️ НИЗКИЙ ПРИОРИТЕТ';
                reason = `Низкая рентабельность или высокие риски. Прибыль: $${estimatedProfit}. ${profitAnalysis}`;
                recommendationClass = 'negative';
            } else {
                recommendation = '❌ НЕ РЕКОМЕНДУЕТСЯ';
                reason = `Высокие риски и низкая прибыль. Прибыль: $${estimatedProfit}. ${profitAnalysis}`;
                recommendationClass = 'negative';
            }

            return {
                ratePerMile: ratePerMile.toFixed(2),
                fuelCost,
                fuelCostUSD,
                estimatedProfit,
                driveTime,
                profitRating,
                profitMargin,
                profitAnalysis,
                risks,
                riskScore,
                advantages,
                advantageScore,
                routeAnalysis,
                timingAnalysis,
                marketComparison,
                recommendation,
                reason,
                recommendationClass,
                totalScore
            };
        }

        function renderLoads(filteredLoads) {
            const container = document.getElementById('loadsContainer');
            container.innerHTML = '';

            filteredLoads.forEach(load => {
                const analysis = analyzeLoad(load);
                
                const card = document.createElement('div');
                card.className = 'load-card';
                card.onclick = function() {
                    this.classList.toggle('flipped');
                    
                    // Перезапуск анимации для flip-hint
                    const hints = this.querySelectorAll('.flip-hint');
                    hints.forEach(hint => {
                        hint.style.animation = 'none';
                        setTimeout(() => {
                            hint.style.animation = 'fadeOut 4s forwards';
                        }, 10);
                    });
                };
                
                card.innerHTML = `
                    <div class="load-card-inner">
                        <div class="load-card-front">
                            <div class="load-header">
                                <div class="load-route-header">${load.pickupState} → ${load.deliveryState}</div>
                                <div class="load-rate">$${load.rate.toLocaleString()}</div>
                            </div>
                            <div class="load-route">
                                <div style="font-size: 16px; color: var(--text-secondary); margin-bottom: 4px;">Груз #${load.id}</div>
                                <div class="route-text">
                                    🚛 ${load.pickupCity}, ${load.pickupState} → ${load.deliveryCity}, ${load.deliveryState}
                                </div>
                            </div>
                            ${load.company ? `
                            <div style="background: rgba(139, 92, 246, 0.1); padding: 6px 8px; border-radius: 6px; margin: 6px 0; border-left: 2px solid var(--primary);">
                                <div style="font-weight: 700; color: var(--text); margin-bottom: 2px; font-size: 16px;">🏢 ${load.company}</div>
                                <div style="font-size: 16px; color: var(--text-secondary); display: flex; justify-content: space-between;">
                                    <span>📍 ${load.companyLocation}</span>
                                    <span>⭐ ${load.creditScore}/100</span>
                                </div>
                                <div style="font-size: 16px; color: var(--text-secondary); margin-top: 2px;">
                                    💰 Оплата: ${load.daysToPayAvg} дней
                                </div>
                            </div>
                            ` : ''}
                            <div class="load-details">
                                <div>
                                    <div class="detail-label">Грузоотправитель</div>
                                    <div class="detail-item">${load.shipper}</div>
                                </div>
                                ${load.deadhead ? `
                                <div>
                                    <div class="detail-label">Deadhead</div>
                                    <div class="detail-item">+${load.deadhead} миль</div>
                                </div>
                                ` : ''}
                                <div>
                                    <div class="detail-label">Расстояние</div>
                                    <div class="detail-item">${load.distance} миль</div>
                                </div>
                                <div>
                                    <div class="detail-label">Вес</div>
                                    <div class="detail-item">${load.weight.toLocaleString()} фунтов</div>
                                </div>
                                <div>
                                    <div class="detail-label">Тип груза</div>
                                    <div class="detail-item">${load.cargoType}</div>
                                </div>
                                <div>
                                    <div class="detail-label">Дата погрузки</div>
                                    <div class="detail-item">${load.pickupDate ? new Date(load.pickupDate).toLocaleDateString('ru-RU', {day: '2-digit', month: '2-digit', year: 'numeric'}) : 'TBD'}</div>
                                </div>
                                <div>
                                    <div class="detail-label">Время погрузки</div>
                                    <div class="detail-item">${load.pickupTime}</div>
                                </div>
                                <div>
                                    <div class="detail-label">Дата разгрузки</div>
                                    <div class="detail-item">${load.deliveryDate ? new Date(load.deliveryDate).toLocaleDateString('ru-RU', {day: '2-digit', month: '2-digit', year: 'numeric'}) : 'TBD'}</div>
                                </div>
                                ${load.mpg ? `
                                <div>
                                    <div class="detail-label">MPG</div>
                                    <div class="detail-item">${load.mpg}</div>
                                </div>
                                ` : ''}
                                ${load.rpm ? `
                                <div>
                                    <div class="detail-label">RPM</div>
                                    <div class="detail-item" style="color: #48bb78; font-weight: bold;">${load.rpm}</div>
                                </div>
                                ` : ''}
                                <div>
                                    <div class="detail-label">$/миля</div>
                                    <div class="detail-item" style="color: #48bb78; font-weight: bold;">$${(load.rate / load.distance).toFixed(2)}/миля</div>
                                </div>
                            </div>
                            ${load.contactEmail ? `
                            <div style="background: rgba(59, 130, 246, 0.1); padding: 6px 8px; border-radius: 6px; margin-top: 6px; font-size: 16px;">
                                <div style="color: var(--text-secondary);">📧 ${load.contactEmail}</div>
                                <div style="color: var(--text-secondary); margin-top: 2px;">📞 ${load.contactPhone}</div>
                            </div>
                            ` : ''}
                            <div class="load-footer">
                                <span class="equipment-badge">${load.equipment}</span>
                                <span class="status-badge">✓ Доступен</span>
                            </div>
                            <div class="flip-hint">🔄 Нажмите для анализа</div>
                        </div>
                        <div class="load-card-back">
                            <div class="analysis-title">📊 Анализ груза #${load.id}</div>
                            
                            <div class="analysis-section">
                                <div class="metric-row">
                                    <span class="metric-label">Рейтинг прибыльности</span>
                                    <span class="metric-value">${analysis.profitRating}/10</span>
                                </div>
                                <div class="rating-bar">
                                    <div class="rating-fill" style="width: ${analysis.profitRating * 10}%"></div>
                                </div>
                                <div style="font-size: 16px; color: var(--text-secondary); margin-top: 6px; line-height: 1.4;">
                                    ${analysis.profitAnalysis}
                                </div>
                            </div>

                            <div class="analysis-section">
                                ${load.profit ? `
                                <div class="metric-row">
                                    <span class="metric-label">💰 Прибыль</span>
                                    <span class="metric-value" style="color: #22c55e; font-weight: 700;">$${load.profit.toFixed(2)}</span>
                                </div>
                                ` : ''}
                                ${load.totalMiles ? `
                                <div class="metric-row">
                                    <span class="metric-label">Общий пробег (с deadhead)</span>
                                    <span class="metric-value">${load.totalMiles} миль</span>
                                </div>
                                ` : ''}
                                <div class="metric-row">
                                    <span class="metric-label">Ставка за милю</span>
                                    <span class="metric-value" style="color: ${analysis.ratePerMile >= 5 ? '#22c55e' : analysis.ratePerMile >= 3.5 ? '#f59e0b' : '#ef4444'}">$${analysis.ratePerMile}/миля</span>
                                </div>
                                ${!load.profit ? `
                                <div class="metric-row">
                                    <span class="metric-label">Общая прибыль</span>
                                    <span class="metric-value" style="color: #22c55e">$${analysis.estimatedProfit}</span>
                                </div>
                                ` : ''}
                                ${load.fuelCostCalc ? `
                                <div class="metric-row">
                                    <span class="metric-label">Расход топлива</span>
                                    <span class="metric-value">$${load.fuelCostCalc.toFixed(2)}</span>
                                </div>
                                ` : `
                                <div class="metric-row">
                                    <span class="metric-label">Расход топлива</span>
                                    <span class="metric-value">~${analysis.fuelCost} галлонов ($${analysis.fuelCostUSD})</span>
                                </div>
                                `}
                                <div class="metric-row">
                                    <span class="metric-label">Время в пути</span>
                                    <span class="metric-value">${analysis.driveTime} часов</span>
                                </div>
                            </div>

                            ${analysis.advantages.length > 0 ? `
                            <div class="analysis-section">
                                <div class="analysis-title" style="font-size: 16px; color: #22c55e;">✅ Преимущества</div>
                                <div class="analysis-content" style="font-size: 16px; line-height: 1.5;">
                                    ${analysis.advantages.map(a => `• ${a}`).join('<br>')}
                                </div>
                            </div>
                            ` : ''}

                            ${analysis.risks.length > 0 ? `
                            <div class="analysis-section">
                                <div class="analysis-title" style="font-size: 16px; color: #f59e0b;">⚠️ Риски и особенности</div>
                                <div class="analysis-content" style="font-size: 16px; line-height: 1.5;">
                                    ${analysis.risks.map(r => `• ${r}`).join('<br>')}
                                </div>
                            </div>
                            ` : ''}

                            <div class="analysis-section">
                                <div class="analysis-title" style="font-size: 16px;">🗺️ Анализ маршрута</div>
                                <div class="analysis-content" style="font-size: 16px; line-height: 1.4;">
                                    ${analysis.routeAnalysis}
                                </div>
                            </div>

                            <div class="analysis-section">
                                <div class="analysis-title" style="font-size: 16px;">⏰ Анализ времени</div>
                                <div class="analysis-content" style="font-size: 16px; line-height: 1.4;">
                                    ${analysis.timingAnalysis}
                                </div>
                            </div>

                            ${load.spotDate ? `
                            <div class="analysis-section">
                                <div class="analysis-title" style="font-size: 16px;">📈 Сравнение с рынком</div>
                                <div class="analysis-content" style="font-size: 16px; line-height: 1.4;">
                                    ${analysis.marketComparison}
                                </div>
                                <div style="background: rgba(255, 255, 255, 0.05); padding: 6px; border-radius: 6px; font-size: 16px; margin-top: 6px;">
                                    <div style="color: var(--text-secondary);">Spot: ${load.spotDate} | Contract: ${load.contractRate}</div>
                                </div>
                            </div>
                            ` : ''}

                            <div class="recommendation ${analysis.recommendationClass}">
                                <strong style="font-size: 16px;">${analysis.recommendation}</strong><br>
                                <small style="opacity: 0.9; font-size: 16px; line-height: 1.4; display: block; margin-top: 4px;">${analysis.reason}</small>
                            </div>
                            
                            <div class="flip-hint">🔄 Нажмите чтобы вернуться</div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

            document.getElementById('totalLoads').textContent = filteredLoads.length;
            const avgRate = Math.round(filteredLoads.reduce((sum, l) => sum + l.rate, 0) / filteredLoads.length);
            document.getElementById('avgRate').textContent = '$' + avgRate.toLocaleString();
            const totalMiles = filteredLoads.reduce((sum, l) => sum + l.distance, 0);
            document.getElementById('totalMiles').textContent = totalMiles.toLocaleString();
        }

        function applyFilters() {
            const stateFilter = document.getElementById('stateFilter').value;
            const deliveryStateFilter = document.getElementById('deliveryStateFilter').value;
            const equipmentFilter = document.getElementById('equipmentFilter').value;
            const minRate = parseFloat(document.getElementById('minRate').value) || 0;

            const filtered = loads.filter(load => {
                const matchPickupState = !stateFilter || load.pickupState === stateFilter;
                const matchDeliveryState = !deliveryStateFilter || load.deliveryState === deliveryStateFilter;
                const matchEquipment = !equipmentFilter || load.equipment === equipmentFilter;
                const matchRate = load.rate >= minRate;

                return matchPickupState && matchDeliveryState && matchEquipment && matchRate;
            });

            // Shuffle filtered results
            const shuffledFiltered = shuffleArray(filtered);
            renderLoads(shuffledFiltered);
        }

        // Shuffle function for randomizing load order
        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // Event listeners
        document.getElementById('stateFilter').addEventListener('change', applyFilters);
        document.getElementById('deliveryStateFilter').addEventListener('change', applyFilters);
        document.getElementById('equipmentFilter').addEventListener('change', applyFilters);
        document.getElementById('minRate').addEventListener('input', applyFilters);

        // Initial render with randomized order
        const shuffledLoads = shuffleArray(loads);
        renderLoads(shuffledLoads);

        // Scroll to top button
        const scrollToTopBtn = document.getElementById('scrollToTop');
        window.addEventListener('scroll', () => {
            const scrollPercent = (window.pageYOffset / (document.documentElement.scrollHeight - window.innerHeight)) * 100;
            if (scrollPercent > 25) {
                scrollToTopBtn.style.display = 'flex';
            } else {
                scrollToTopBtn.style.display = 'none';
            }
        });
        scrollToTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        
        // Load saved theme
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'light') {
            html.setAttribute('data-theme', 'light');
            themeToggle.textContent = '☀️';
        }
        
        themeToggle.addEventListener('click', () => {
            const currentTheme = html.getAttribute('data-theme');
            if (currentTheme === 'light') {
                html.removeAttribute('data-theme');
                themeToggle.textContent = '🌙';
                localStorage.setItem('theme', 'dark');
            } else {
                html.setAttribute('data-theme', 'light');
                themeToggle.textContent = '☀️';
                localStorage.setItem('theme', 'light');
            }
        });
    </script>
<script src="../theme-switcher.js"></script>
</body>
</html>
