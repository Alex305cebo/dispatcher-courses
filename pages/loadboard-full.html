<html lang="ru">
<head>
    <meta charset="UTF-8">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a365d 0%, #2c5282 100%);
            min-height: 100vh;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            background: white; backdrop-filter: blur(10px);
            padding: 20px 40px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #2d3748;
            font-size: 32px;
        }

        .back-btn {
            padding: 12px 24px;
            background: #4299e1;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #3182ce;
            transform: translateY(-2px);
        }

        .container {
            max-width: 1600px;
            width: 100%;
            margin: 0 auto;
        }

        .filters {
            background: white; backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .filters h3 {
            color: #2d3748;
            margin-bottom: 15px;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .filter-item input, .filter-item select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
        }

        .filter-item label {
            display: block;
            margin-bottom: 5px;
            color: #4a5568;
            font-weight: 600;
            font-size: 14px;
        }

        .stats {
            background: white; backdrop-filter: blur(10px);
            padding: 30px 20px;
            border-radius: 20px;
            margin-bottom: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .stat-box {
            text-align: center;
        }

        .stat-box .number {
            font-size: 36px;
            font-weight: bold;
            color: #4299e1;
        }

        .stat-box .label {
            color: #718096;
            font-size: 14px;
        }

        .loads-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
        }

        .load-card {
            background: white; backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 30px 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            border-left: 5px solid #4299e1;
        }

        .load-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .load-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .load-id {
            font-size: 18px;
            font-weight: bold;
            color: #2d3748;
        }

        .load-rate {
            font-size: 24px;
            font-weight: bold;
            color: #48bb78;
        }

        .load-route {
            background: #f7fafc;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .route-text {
            color: #2d3748;
            font-weight: 600;
            font-size: 15px;
        }

        .load-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
            font-size: 13px;
        }

        .detail-item {
            color: #4a5568;
        }

        .detail-label {
            color: #718096;
            font-size: 12px;
        }

        .load-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid #e2e8f0;
        }

        .equipment-badge {
            background: #edf2f7;
            color: #2d3748;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-badge {
            background: #c6f6d5;
            color: #22543d;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 0;
            }

            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
                padding: 15px 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .filters {
                padding: 15px;
            }

            .filter-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .stats {
                padding: 15px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .loads-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .load-card {
                padding: 15px;
            }

            .load-header h3 {
                font-size: 16px;
            }

            .load-route {
                font-size: 13px;
            }

            .load-details {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            .detail-item {
                font-size: 13px;
            }
        }
    body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: 
        radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.3), transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(138, 43, 226, 0.3), transparent 50%),
        radial-gradient(circle at 40% 20%, rgba(75, 0, 130, 0.2), transparent 50%);
    animation: backgroundMove 20s ease infinite;
    z-index: -1;
}

@keyframes backgroundMove {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(5%, 5%) scale(1.05); }
    50% { transform: translate(-5%, 5%) scale(1.1); }
    75% { transform: translate(5%, -5%) scale(1.05); }
}</style>

            {id:1063,shipper:'Wyoming Oil',pickupCity:'Casper',pickupState:'WY',deliveryCity:'Cheyenne',deliveryState:'WY',distance:180,weight:46000,cargoType:'Oil Equipment',rate:1080,equipment:'Flatbed',pickupTime:'08:00'}
        ];

        // Populate state filters
        const pickupStates = [...new Set(loads.map(l => l.pickupState))].sort();
        const deliveryStates = [...new Set(loads.map(l => l.deliveryState))].sort();
        
        const stateFilter = document.getElementById('stateFilter');
        pickupStates.forEach(state => {
            const option = document.createElement('option');
            option.value = state;
            option.textContent = state;
            stateFilter.appendChild(option);
        });

        const deliveryStateFilter = document.getElementById('deliveryStateFilter');
        deliveryStates.forEach(state => {
            const option = document.createElement('option');
            option.value = state;
            option.textContent = state;
            deliveryStateFilter.appendChild(option);
        });

        function renderLoads(filteredLoads) {
            const container = document.getElementById('loadsContainer');
            container.innerHTML = '';

            filteredLoads.forEach(load => {
                const card = document.createElement('div');
                card.className = 'load-card';
                card.innerHTML = `
                    <div class="load-header">
                        <div class="load-id">Груз #${load.id}</div>
                        <div class="load-rate">$${load.rate}</div>
                    </div>
                    <div class="load-route">
                        <div class="route-text">
                            🚛 ${load.pickupCity}, ${load.pickupState} → ${load.deliveryCity}, ${load.deliveryState}
                        </div>
                    </div>
                    <div class="load-details">
                        <div>
                            <div class="detail-label">Грузоотправитель</div>
                            <div class="detail-item">${load.shipper}</div>
                        </div>
                        <div>
                            <div class="detail-label">Расстояние</div>
                            <div class="detail-item">${load.distance} миль</div>
                        </div>
                        <div>
                            <div class="detail-label">Вес</div>
                            <div class="detail-item">${load.weight.toLocaleString()} фунтов</div>
                        </div>
                        <div>
                            <div class="detail-label">Тип груза</div>
                            <div class="detail-item">${load.cargoType}</div>
                        </div>
                        <div>
                            <div class="detail-label">Время погрузки</div>
                            <div class="detail-item">${load.pickupTime}</div>
                        </div>
                        <div>
                            <div class="detail-label">К/м показатель</div>
                            <div class="detail-item" style="color: #48bb78; font-weight: bold;">$${(load.rate / load.distance).toFixed(2)}/миля</div>
                        </div>
                    </div>
                    <div class="load-footer">
                        <span class="equipment-badge">${load.equipment}</span>
                        <span class="status-badge">✓ Доступен</span>
                    </div>
                `;
                container.appendChild(card);
            });

            // Update stats
            document.getElementById('totalLoads').textContent = filteredLoads.length;
            const avgRate = Math.round(filteredLoads.reduce((sum, l) => sum + l.rate, 0) / filteredLoads.length);
            document.getElementById('avgRate').textContent = '$' + avgRate.toLocaleString();
            const totalMiles = filteredLoads.reduce((sum, l) => sum + l.distance, 0);
            document.getElementById('totalMiles').textContent = totalMiles.toLocaleString();
        }

        function applyFilters() {
            const stateFilter = document.getElementById('stateFilter').value;
            const deliveryStateFilter = document.getElementById('deliveryStateFilter').value;
            const equipmentFilter = document.getElementById('equipmentFilter').value;
            const minRate = parseFloat(document.getElementById('minRate').value) || 0;

            const filtered = loads.filter(load => {
                const matchPickupState = !stateFilter || load.pickupState === stateFilter;
                const matchDeliveryState = !deliveryStateFilter || load.deliveryState === deliveryStateFilter;
                const matchEquipment = !equipmentFilter || load.equipment === equipmentFilter;
                const matchRate = load.rate >= minRate;

                return matchPickupState && matchDeliveryState && matchEquipment && matchRate;
            });

            renderLoads(filtered);
        }

        // Event listeners
        document.getElementById('stateFilter').addEventListener('change', applyFilters);
        document.getElementById('deliveryStateFilter').addEventListener('change', applyFilters);
        document.getElementById('equipmentFilter').addEventListener('change', applyFilters);
        document.getElementById('minRate').addEventListener('input', applyFilters);

        // Initial render
        renderLoads(loads);
    </script>

    <!-- Кнопка "Наверх" -->
    <button id="scrollToTop" style="display: none; position: fixed; bottom: 20px; right: 20px; z-index: 1000; padding: 10px 15px; background: rgba(66, 153, 225, 0.7); color: white; border: none; border-radius: 50%; cursor: pointer; font-size: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); transition: all 0.3s ease; opacity: 0.6;">
        ↑
    </button>
    <script>
        const scrollToTopBtn = document.getElementById('scrollToTop');
        scrollToTopBtn.addEventListener('mouseenter', () => {
            scrollToTopBtn.style.opacity = '1';
        });
        scrollToTopBtn.addEventListener('mouseleave', () => {
            scrollToTopBtn.style.opacity = '0.6';
        });
        window.addEventListener('scroll', () => {
            const scrollPercent = (window.pageYOffset / (document.documentElement.scrollHeight - window.innerHeight)) * 100;
            if (scrollPercent > 25) {
                scrollToTopBtn.style.display = 'block';
            } else {
                scrollToTopBtn.style.display = 'none';
            }
        });
        scrollToTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
</body>
</html>
