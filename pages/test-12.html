<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест: Модуль 12 - Профессиональное развитие | Курсы - Диспетчера</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%); min-height: 100vh; padding: 30px 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 900px; width: 100%; margin: 0 auto; }
        .header { background: white; backdrop-filter: blur(10px); padding: 30px 40px; border-radius: 20px; margin-bottom: 30px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .test-badge { display: inline-flex; align-items: center; gap: 10px; background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%); color: white; padding: 10px 20px; border-radius: 25px; font-weight: 600; font-size: 18px; }
        .back-btn { padding: 10px 20px; background: #f3f4f6; color: #374151; text-decoration: none; border-radius: 8px; font-weight: 600; transition: all 0.3s ease; }
        .back-btn:hover { background: #e5e7eb; }
        h1 { color: #2d3748; font-size: 32px; margin-bottom: 10px; }
        .subtitle { color: #718096; font-size: 18px; }
        .progress-bar { background: #e5e7eb; height: 8px; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, #a855f7, #7c3aed); height: 100%; width: 0%; transition: width 0.3s ease; }
        .question-card { background: white; backdrop-filter: blur(10px); border-radius: 20px; padding: 35px; margin-bottom: 25px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); display: none; }
        .question-card.active { display: block; animation: slideIn 0.4s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .question-number { color: #a855f7; font-size: 16px; font-weight: 600; margin-bottom: 10px; }
        .question-text { color: #2d3748; font-size: 22px; font-weight: 600; margin-bottom: 25px; line-height: 1.5; }
        .answers { display: flex; flex-direction: column; gap: 12px; }
        .answer { background: #f7fafc; padding: 18px 20px; border-radius: 10px; border: 2px solid transparent; cursor: pointer; transition: all 0.3s ease; font-size: 17px; color: #4a5568; }
        .answer:hover { background: #edf2f7; border-color: #a855f7; transform: translateX(5px); }
        .answer.selected { background: #f3e8ff; border-color: #a855f7; color: #6b21a8; font-weight: 600; }
        .answer.correct { background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%); border-color: #10b981; color: #065f46; font-weight: 600; }
        .answer.incorrect { background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%); border-color: #ef4444; color: #991b1b; font-weight: 600; opacity: 0.6; }
        .nav-buttons { display: flex; gap: 15px; margin-top: 25px; }
        .btn { padding: 14px 30px; border-radius: 10px; font-weight: 600; font-size: 16px; border: none; cursor: pointer; transition: all 0.3s ease; }
        .btn-primary { background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4); }
        .btn-secondary { background: white; backdrop-filter: blur(10px); color: #a855f7; border: 2px solid #a855f7; }
        .btn-secondary:hover { background: #a855f7; color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .results { background: white; backdrop-filter: blur(10px); border-radius: 20px; padding: 40px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); text-align: center; display: none; }
        .results.show { display: block; animation: slideIn 0.4s ease; }
        .score { font-size: 72px; font-weight: bold; margin: 20px 0; }
        .score.pass { color: #10b981; }
        .score.fail { color: #ef4444; }
        .result-message { font-size: 24px; color: #2d3748; margin-bottom: 30px; }
        @media (max-width: 768px) { 
            .container { padding: 10px; }
            .header { padding: 30px 20px; margin-bottom: 20px; }
            .header-top { flex-direction: column; gap: 15px; } 
            h1 { font-size: 24px; } 
            .subtitle { font-size: 16px; }
            .question-card { padding: 25px 20px; }
            .question-text { font-size: 18px; } 
            .answer { padding: 15px; font-size: 16px; }
            .btn { padding: 12px 20px; font-size: 15px; }
            .nav-buttons { flex-direction: column; }
            .nav-buttons .btn { width: 100%; }
            .score { font-size: 56px; }
            .result-message { font-size: 20px; }
        }
    body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: 
        radial-gradient(circle at 20% 50%, rgba(168, 85, 247, 0.3), transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.3), transparent 50%),
        radial-gradient(circle at 40% 20%, rgba(109, 40, 217, 0.2), transparent 50%);
    animation: backgroundMove 20s ease infinite;
    z-index: -1;
}

@keyframes backgroundMove {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(5%, 5%) scale(1.05); }
    50% { transform: translate(-5%, 5%) scale(1.1); }
    75% { transform: translate(5%, -5%) scale(1.05); }
}</style>

    <script>!function(){var t=localStorage.getItem('dispatcher-theme')||'dark';'dark'===t&&document.documentElement.setAttribute('data-theme','dark')}();</script>


    <link rel="stylesheet" href="../dark-theme.css">
    <script src="../dark-mode.js"></script>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="header-top">
                <div class="test-badge">📝 Тест: Модуль 12</div>
                <a href="modules.html" class="back-btn">← Назад</a>
            </div>
            <h1>Профессиональное развитие и карьера</h1>
            <p class="subtitle">22 вопроса для проверки знаний</p>
            <div class="progress-bar"><div class="progress-fill" id="progressBar"></div></div>
        </div>

        <div id="questionsContainer"></div>

        <div class="results" id="results">
            <h2 style="color: #2d3748; font-size: 32px; margin-bottom: 20px;">Результаты теста</h2>
            <div class="score" id="scoreDisplay"></div>
            <p class="result-message" id="resultMessage"></p>
            <div class="nav-buttons">
                <button class="btn btn-primary" onclick="location.href='modules.html'">Вернуться к модулям</button>
                <button class="btn btn-secondary" onclick="location.reload()">Пройти заново</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            {q: "Начальная позиция в диспетчерской карьере:", a: ["CEO", "Junior Dispatcher", "Senior Manager", "Owner"], correct: 1},
            {q: "Средний срок роста от Junior до Senior Dispatcher:", a: ["1 месяц", "6 месяцев - 2 года", "10 лет", "Невозможно"], correct: 1},
            {q: "Что такое CTP сертификация?", a: ["Computer Training Program", "Certified Transportation Professional", "Carrier Transport Protocol", "Central Tracking Platform"], correct: 1},
            {q: "Что нужно указать в резюме диспетчера?", a: ["Только имя", "Навыки, опыт, достижения, метрики", "Только фото", "Только телефон"], correct: 1},
            {q: "Где искать вакансии диспетчера?", a: ["Только в газетах", "Indeed, LinkedIn, Glassdoor", "Только по знакомству", "Нигде"], correct: 1},
            {q: "Что такое MC Authority?", a: ["Водительские права", "Operating Authority от FMCSA", "Страховой полис", "Номер трака"], correct: 1},
            {q: "Минимальная страховка для MC Authority:", a: ["$1,000", "$75,000", "$10,000", "$500"], correct: 1},
            {q: "Что такое LLC?", a: ["Load Logistics Center", "Limited Liability Company", "Long Load Carrier", "License for Logistics"], correct: 1},
            {q: "Что такое EIN?", a: ["Engine Identification Number", "Employer Identification Number", "Electronic Invoice", "Emergency Information"], correct: 1},
            {q: "Типичный вопрос на собеседовании:", a: ["Любимый цвет", "Опыт работы с Load Boards", "Любимая еда", "Хобби"], correct: 1},
            {q: "Что важно в Cover Letter?", a: ["Длина 10 страниц", "Краткое описание навыков и мотивации", "Только имя", "Фотографии"], correct: 1},
            {q: "LinkedIn профиль нужен для:", a: ["Игр", "Профессионального нетворкинга", "Развлечений", "Не нужен"], correct: 1},
            {q: "Что такое BOC-3?", a: ["Тип трака", "Process Agent для MC Authority", "Страховка", "Load Board"], correct: 1},
            {q: "Стартовый капитал для открытия компании:", a: ["$100", "$5,000-$20,000+", "$1,000,000", "$50"], correct: 1},
            {q: "Что такое UCR Registration?", a: ["Unified Carrier Registration", "Universal Credit Rating", "Used Car Registry", "Urban Cargo Rules"], correct: 0},
            {q: "Типы бизнеса в логистике:", a: ["Только Carrier", "Carrier, Broker, Freight Forwarder", "Только Broker", "Нет типов"], correct: 1},
            {q: "Зарплата Senior Dispatcher:", a: ["$500/месяц", "$4,000-$8,000/месяц", "$100/месяц", "$50,000/месяц"], correct: 1},
            {q: "Что такое CLTD сертификация?", a: ["Car License Training", "Certified in Logistics, Transportation and Distribution", "Computer Learning", "Carrier Load Tracking"], correct: 1},
            {q: "Масштабирование бизнеса включает:", a: ["Только покупку траков", "Расширение флота, найм, автоматизация", "Только найм", "Ничего"], correct: 1},
            {q: "Remote работа диспетчером:", a: ["Невозможна", "Возможна с компьютером и интернетом", "Только в офисе", "Запрещена"], correct: 1},
            {q: "Что важно для карьерного роста?", a: ["Только удача", "Навыки, опыт, сертификации, нетворкинг", "Только возраст", "Ничего"], correct: 1},
            {q: "Freight Broker License требует:", a: ["Только желание", "MC Authority и $75k bond", "Только деньги", "Ничего"], correct: 1}
        ];

        let currentQuestion = 0;
        let answers = [];
        let score = 0;

        function initTest() {
            const container = document.getElementById('questionsContainer');
            
            // Перемешиваем ответы для каждого вопроса
            questions.forEach((q, index) => {
                // Создаем массив с ответами и их оригинальными индексами
                const shuffledAnswers = q.a.map((answer, i) => ({ answer, originalIndex: i }));
                
                // Перемешиваем массив
                for (let i = shuffledAnswers.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffledAnswers[i], shuffledAnswers[j]] = [shuffledAnswers[j], shuffledAnswers[i]];
                }
                
                // Сохраняем перемешанные ответы и новый индекс правильного ответа
                q.shuffledAnswers = shuffledAnswers;
                q.newCorrectIndex = shuffledAnswers.findIndex(item => item.originalIndex === q.correct);
                
                const card = document.createElement('div');
                card.className = 'question-card' + (index === 0 ? ' active' : '');
                card.innerHTML = `
                    <div class="question-number">Вопрос ${index + 1} из ${questions.length}</div>
                    <div class="question-text">${q.q}</div>
                    <div class="answers">
                        ${shuffledAnswers.map((item, i) => `<div class="answer" onclick="selectAnswer(${index}, ${i})">${item.answer}</div>`).join('')}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function selectAnswer(questionIndex, answerIndex) {
            if (answers[questionIndex] !== undefined) return; // Уже ответили
            
            const card = document.querySelectorAll('.question-card')[questionIndex];
            const answerDivs = card.querySelectorAll('.answer');
            const correctAnswer = questions[questionIndex].newCorrectIndex;
            
            // Отключаем все ответы
            answerDivs.forEach(div => {
                div.style.pointerEvents = 'none';
            });
            
            // Показываем правильные и неправильные ответы
            answerDivs.forEach((div, i) => {
                if (i === correctAnswer) {
                    div.classList.add('correct');
                } else {
                    div.classList.add('incorrect');
                }
            });
            
            answers[questionIndex] = answerIndex;
            
            // Автоматический переход через 2 секунды
            setTimeout(() => {
                if (questionIndex < questions.length - 1) {
                    nextQuestion();
                } else {
                    finishTest();
                }
            }, 2000);
        }

        function nextQuestion() {
            document.querySelectorAll('.question-card')[currentQuestion].classList.remove('active');
            currentQuestion++;
            document.querySelectorAll('.question-card')[currentQuestion].classList.add('active');
            updateProgress();
        }

        function prevQuestion() {
            document.querySelectorAll('.question-card')[currentQuestion].classList.remove('active');
            currentQuestion--;
            document.querySelectorAll('.question-card')[currentQuestion].classList.add('active');
            updateProgress();
        }

        function updateProgress() {
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        function finishTest() {
            score = 0;
            questions.forEach((q, index) => {
                if (answers[index] === q.newCorrectIndex) score++;
            });
            
            const percentage = Math.round((score / questions.length) * 100);
            const passed = percentage >= 70;
            
            // Сохраняем результат в localStorage
            localStorage.setItem('module_12_test_result', percentage);
            localStorage.setItem('module_12_test_score', score);
            localStorage.setItem('module_12_test_total', questions.length);
            localStorage.setItem('module_12_test_date', new Date().toISOString());
            
            document.getElementById('questionsContainer').style.display = 'none';
            document.getElementById('results').classList.add('show');
            
            const scoreDisplay = document.getElementById('scoreDisplay');
            scoreDisplay.textContent = percentage + '%';
            scoreDisplay.className = 'score ' + (passed ? 'pass' : 'fail');
            
            document.getElementById('resultMessage').textContent = passed ? 
                `Поздравляем! Вы успешно прошли тест (${score}/${questions.length})` :
                `Тест не пройден. Необходимо набрать минимум 70% (${score}/${questions.length})`;
        }

        initTest();
    </script>
<script src="../theme-switcher.js"></script>
</body>
</html>
