<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Карточки вопросов - Диспетчер</title>
    <link rel="stylesheet" href="quiz-cards.css">
</head>
<body>
    <div class="app-container">
        <!-- Заголовок с прогрессом -->
        <header class="quiz-header">
            <button class="back-btn" onclick="window.location.href='dashboard.html'">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </button>
            <div class="progress-info">
                <span class="progress-text">Вопрос <span id="currentQuestion">1</span> из <span id="totalQuestions">20</span></span>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
            <div class="score">
                <span class="score-correct" id="scoreCorrect">0</span> / 
                <span class="score-wrong" id="scoreWrong">0</span>
            </div>
        </header>

        <!-- Контейнер для карточек -->
        <div class="cards-container" id="cardsContainer">
            <!-- Карточки будут добавлены динамически -->
        </div>

        <!-- Подсказки для свайпа -->
        <div class="swipe-hints">
            <div class="hint hint-left">
                <div class="hint-icon">✗</div>
                <div class="hint-text">Неверно</div>
            </div>
            <div class="hint hint-right">
                <div class="hint-icon">✓</div>
                <div class="hint-text">Верно</div>
            </div>
        </div>

        <!-- Кнопки действий -->
        <div class="action-buttons">
            <button class="action-btn btn-wrong" id="btnWrong">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
            </button>
            <button class="action-btn btn-info" id="btnInfo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 16v-4M12 8h.01"/>
                </svg>
            </button>
            <button class="action-btn btn-correct" id="btnCorrect">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 6L9 17l-5-5"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Модальное окно с результатами -->
    <div class="modal" id="resultsModal">
        <div class="modal-content">
            <h2>Результаты теста</h2>
            <div class="results-stats">
                <div class="stat-item stat-correct">
                    <div class="stat-value" id="finalCorrect">0</div>
                    <div class="stat-label">Правильно</div>
                </div>
                <div class="stat-item stat-wrong">
                    <div class="stat-value" id="finalWrong">0</div>
                    <div class="stat-label">Неправильно</div>
                </div>
                <div class="stat-item stat-percent">
                    <div class="stat-value" id="finalPercent">0%</div>
                    <div class="stat-label">Успешность</div>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn-primary" onclick="restartQuiz()">Начать заново</button>
                <button class="btn-secondary" onclick="window.location.href='dashboard.html'">На главную</button>
            </div>
        </div>
    </div>

    <script src="quiz-cards.js"></script>
</body>
</html>
