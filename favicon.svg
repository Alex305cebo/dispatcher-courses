<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- American Truck -->
  <g>
    <!-- Truck cabin -->
    <path d="M10 28 L10 38 L18 38 L18 32 L24 32 L24 38 L32 38 L32 28 Z" fill="#DC2626" stroke="#991B1B" stroke-width="1"/>
    
    <!-- Truck trailer -->
    <rect x="32" y="28" width="22" height="10" fill="#1E40AF" stroke="#1E3A8A" stroke-width="1"/>
    
    <!-- Cabin window -->
    <rect x="12" y="30" width="4" height="4" fill="#60A5FA" opacity="0.7"/>
    
    <!-- Trailer stripes -->
    <line x1="36" y1="28" x2="36" y2="38" stroke="#3B82F6" stroke-width="0.5"/>
    <line x1="40" y1="28" x2="40" y2="38" stroke="#3B82F6" stroke-width="0.5"/>
    <line x1="44" y1="28" x2="44" y2="38" stroke="#3B82F6" stroke-width="0.5"/>
    <line x1="48" y1="28" x2="48" y2="38" stroke="#3B82F6" stroke-width="0.5"/>
    
    <!-- Front wheel -->
    <circle cx="16" cy="40" r="3" fill="#1F2937" stroke="#374151" stroke-width="1"/>
    <circle cx="16" cy="40" r="1.5" fill="#6B7280"/>
    
    <!-- Back wheels -->
    <circle cx="28" cy="40" r="3" fill="#1F2937" stroke="#374151" stroke-width="1"/>
    <circle cx="28" cy="40" r="1.5" fill="#6B7280"/>
    
    <circle cx="48" cy="40" r="3" fill="#1F2937" stroke="#374151" stroke-width="1"/>
    <circle cx="48" cy="40" r="1.5" fill="#6B7280"/>
    
    <!-- USA Flag on trailer -->
    <g transform="translate(38, 30)">
      <!-- Red stripes -->
      <rect x="0" y="0" width="12" height="1" fill="#DC2626"/>
      <rect x="0" y="2" width="12" height="1" fill="#DC2626"/>
      <rect x="0" y="4" width="12" height="1" fill="#DC2626"/>
      <rect x="0" y="6" width="12" height="1" fill="#DC2626"/>
      
      <!-- White stripes -->
      <rect x="0" y="1" width="12" height="1" fill="#FFFFFF"/>
      <rect x="0" y="3" width="12" height="1" fill="#FFFFFF"/>
      <rect x="0" y="5" width="12" height="1" fill="#FFFFFF"/>
      
      <!-- Blue canton -->
      <rect x="0" y="0" width="5" height="4" fill="#1E40AF"/>
      
      <!-- Stars (simplified) -->
      <circle cx="1.5" cy="1" r="0.3" fill="#FFFFFF"/>
      <circle cx="3" cy="1" r="0.3" fill="#FFFFFF"/>
      <circle cx="4.5" cy="1" r="0.3" fill="#FFFFFF"/>
      <circle cx="1.5" cy="2.5" r="0.3" fill="#FFFFFF"/>
      <circle cx="3" cy="2.5" r="0.3" fill="#FFFFFF"/>
      <circle cx="4.5" cy="2.5" r="0.3" fill="#FFFFFF"/>
    </g>
    
    <!-- Headlight -->
    <circle cx="10" cy="34" r="0.8" fill="#FCD34D"/>
  </g>
</svg>
