<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#grad)"/>
  
  <!-- Truck container -->
  <g transform="translate(15, 25)">
    <!-- Trailer -->
    <rect x="0" y="15" width="45" height="25" fill="white" rx="3"/>
    <rect x="5" y="20" width="8" height="8" fill="#8b5cf6" rx="1"/>
    <rect x="15" y="20" width="8" height="8" fill="#8b5cf6" rx="1"/>
    <rect x="25" y="20" width="8" height="8" fill="#8b5cf6" rx="1"/>
    
    <!-- Cabin -->
    <path d="M 45 20 L 45 40 L 65 40 L 65 30 L 58 20 Z" fill="white"/>
    <rect x="48" y="23" width="8" height="8" fill="#8b5cf6" rx="1"/>
    
    <!-- Wheels -->
    <circle cx="15" cy="43" r="5" fill="#1e293b" stroke="white" stroke-width="2"/>
    <circle cx="35" cy="43" r="5" fill="#1e293b" stroke="white" stroke-width="2"/>
    <circle cx="58" cy="43" r="5" fill="#1e293b" stroke="white" stroke-width="2"/>
    
    <!-- Wheel centers -->
    <circle cx="15" cy="43" r="2" fill="white"/>
    <circle cx="35" cy="43" r="2" fill="white"/>
    <circle cx="58" cy="43" r="2" fill="white"/>
    
    <!-- Details -->
    <line x1="45" y1="25" x2="45" y2="35" stroke="#8b5cf6" stroke-width="1"/>
  </g>
</svg>
