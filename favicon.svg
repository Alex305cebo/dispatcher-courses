<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad1)"/>
  
  <!-- Truck body -->
  <rect x="20" y="35" width="35" height="20" fill="white" rx="2"/>
  
  <!-- Truck cabin -->
  <path d="M 55 35 L 55 45 L 70 45 L 65 35 Z" fill="white"/>
  
  <!-- Truck windows -->
  <rect x="58" y="37" width="5" height="6" fill="#6366f1" rx="1"/>
  
  <!-- Wheels -->
  <circle cx="30" cy="58" r="5" fill="#1e293b" stroke="white" stroke-width="2"/>
  <circle cx="60" cy="58" r="5" fill="#1e293b" stroke="white" stroke-width="2"/>
  
  <!-- Wheel centers -->
  <circle cx="30" cy="58" r="2" fill="white"/>
  <circle cx="60" cy="58" r="2" fill="white"/>
</svg>
