<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispatcher Cards - Тренажёр вопросов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.98);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .category {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 600;
            color: white;
        }

        .hint {
            flex: 1;
            text-align: center;
            font-size: 11px;
            color: #d8b4fe;
            line-height: 1.3;
        }

        .counter {
            font-size: 11px;
            font-weight: 700;
            color: white;
        }

        .card-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .card {
            width: 100%;
            max-width: 350px;
            height: 500px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(139, 92, 246, 0.1));
            border: 2px solid rgba(168, 85, 247, 0.3);
            border-radius: 24px;
            padding: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s;
            position: relative;
            backdrop-filter: blur(10px);
        }

        .card:hover {
            transform: scale(1.02);
        }

        .card.flipped .card-front {
            display: none;
        }

        .card.flipped .card-back {
            display: block;
        }

        .card-front, .card-back {
            width: 100%;
        }

        .card-back {
            display: none;
        }

        .category-badge {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(168, 85, 247, 0.2);
            border: 1px solid rgba(168, 85, 247, 0.5);
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
            color: #a855f7;
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 20px;
            font-weight: 600;
            color: white;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .hint-text {
            font-size: 14px;
            color: #cbd5e1;
            line-height: 1.6;
            font-style: italic;
        }

        .answer-text {
            font-size: 15px;
            color: #cbd5e1;
            line-height: 1.7;
            text-align: left;
        }

        .flip-hint {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .buttons {
            padding: 20px;
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn {
            flex: 1;
            max-width: 140px;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
        }

        .btn-no {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .btn-yes {
            background: linear-gradient(135deg, #22c55e, #16a34a);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .results {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .results.show {
            display: flex;
        }

        .results-content {
            background: rgba(15, 23, 42, 0.98);
            border: 2px solid rgba(168, 85, 247, 0.3);
            border-radius: 24px;
            padding: 40px;
            max-width: 400px;
            text-align: center;
        }

        .results-title {
            font-size: 32px;
            font-weight: 900;
            color: white;
            margin-bottom: 24px;
        }

        .results-score {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }

        .results-text {
            font-size: 16px;
            color: #cbd5e1;
            margin-bottom: 32px;
        }

        .btn-restart {
            padding: 16px 32px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-restart:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4);
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="category">
                <span id="categoryIcon">🎯</span>
                <span id="categoryName">Загрузка</span>
            </div>
            <div class="hint" id="shortHint">💡 Подумайте над вопросом...</div>
            <div class="counter">
                <span id="currentIndex">1</span>/<span id="totalQuestions">30</span>
            </div>
        </div>

        <div class="card-container">
            <div class="card" id="card" onclick="flipCard()">
                <div class="card-front">
                    <div class="category-badge" id="categoryBadge">Законодательство</div>
                    <div class="question-text" id="questionText">Загрузка вопроса...</div>
                    <div class="hint-text" id="hintText">Подумайте над вопросом...</div>
                    <div class="flip-hint">Нажмите для просмотра ответа</div>
                </div>
                <div class="card-back">
                    <div class="category-badge" id="categoryBadgeBack">Законодательство</div>
                    <div class="answer-text" id="answerText">Ответ загружается...</div>
                    <div class="flip-hint">Нажмите чтобы вернуться</div>
                </div>
            </div>
        </div>

        <div class="buttons">
            <button class="btn btn-no" onclick="answer(false)">❌ НЕТ</button>
            <button class="btn btn-yes" onclick="answer(true)">✅ ДА</button>
        </div>
    </div>

    <div class="results" id="results">
        <div class="results-content">
            <div class="results-title">🎉 Результаты</div>
            <div class="results-score" id="score">0/30</div>
            <div class="results-text" id="resultsText">Отличная работа!</div>
            <button class="btn-restart" onclick="restart()">🔄 Начать заново</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                id: 1,
                category: "Законодательство",
                text: "Разрешено ли водителю использовать Personal Conveyance (PC) для поездки домой после разгрузки?",
                shortHint: "Правила PC",
                hint: "Personal Conveyance — это статус для личных нужд водителя. Подумайте, считается ли путь домой после завершения рабочего цикла личной поездкой или продвижением к следующей загрузке.",
                analytics: "Правильный ответ: ДА. Водитель может использовать PC для поездки домой или к месту отдыха, если он полностью освобожден от рабочих обязанностей и это не делается для продвижения к следующей точке погрузки. PC не засчитывается в 14-часовое окно.",
                isCorrect: true
            },
            {
                id: 2,
                category: "Законодательство",
                text: "Может ли 30-минутный перерыв быть выполнен в статусе On-Duty?",
                shortHint: "Статусы отдыха",
                hint: "30-минутный перерыв обязателен после 8 часов вождения. Вспомните, какие статусы ELD считаются отдыхом: Off-Duty, Sleeper Berth, или On-Duty тоже подходит?",
                analytics: "Правильный ответ: НЕТ. Согласно правилам FMCSA, 30-минутный перерыв должен быть выполнен в статусе Off-Duty или Sleeper Berth. Любая рабочая активность (On-Duty) прерывает отдых и не засчитывается как обязательный перерыв.",
                isCorrect: false
            }
        ];

        let currentIndex = 0;
        let correct = 0;
        let wrong = 0;
        let isFlipped = false;

        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        let sessionQuestions = shuffleArray(questions).slice(0, 30);

        function getCategoryIcon(category) {
            const icons = {
                'Законодательство': '⚖️',
                'Финансы': '💰',
                'Переговоры': '🤝',
                'Основы работы': '🚛',
                'Безопасность': '🛡️',
                'Документация': '📄',
                'Проверка брокера': '🔍'
            };
            return icons[category] || '🎯';
        }

        function showQuestion() {
            if (currentIndex >= sessionQuestions.length) {
                showResults();
                return;
            }

            const question = sessionQuestions[currentIndex];
            const icon = getCategoryIcon(question.category);

            document.getElementById('categoryIcon').textContent = icon;
            document.getElementById('categoryName').textContent = question.category;
            document.getElementById('shortHint').textContent = `💡 Наводка: ${question.shortHint}`;
            document.getElementById('currentIndex').textContent = currentIndex + 1;
            document.getElementById('totalQuestions').textContent = sessionQuestions.length;

            document.getElementById('categoryBadge').textContent = question.category;
            document.getElementById('categoryBadgeBack').textContent = question.category;
            document.getElementById('questionText').textContent = question.text;
            document.getElementById('hintText').textContent = question.hint;
            document.getElementById('answerText').textContent = question.analytics;

            isFlipped = false;
            document.getElementById('card').classList.remove('flipped');
        }

        function flipCard() {
            isFlipped = !isFlipped;
            document.getElementById('card').classList.toggle('flipped');
        }

        function answer(userAnswer) {
            const question = sessionQuestions[currentIndex];
            
            if (userAnswer === question.isCorrect) {
                correct++;
            } else {
                wrong++;
            }

            currentIndex++;
            showQuestion();
        }

        function showResults() {
            const percentage = Math.round((correct / sessionQuestions.length) * 100);
            document.getElementById('score').textContent = `${correct}/${sessionQuestions.length}`;
            document.getElementById('resultsText').textContent = 
                percentage >= 80 ? 'Отличная работа! 🎉' :
                percentage >= 60 ? 'Хороший результат! 👍' :
                'Продолжайте практиковаться! 💪';
            document.getElementById('results').classList.add('show');
        }

        function restart() {
            currentIndex = 0;
            correct = 0;
            wrong = 0;
            sessionQuestions = shuffleArray(questions).slice(0, 30);
            document.getElementById('results').classList.remove('show');
            showQuestion();
        }

        // Инициализация
        showQuestion();
    </script>
</body>
</html>
