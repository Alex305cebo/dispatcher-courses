[build]
  base = "dispatcher-cards-app"
  command = "npm run build"
  publish = "dispatcher-cards-app/.next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--legacy-peer-deps"

# Настройки для Next.js
[functions]
  node_bundler = "esbuild"
